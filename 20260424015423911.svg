<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 Z" fill="#333"></path>
    </marker>
    <style>
      .edge { stroke: #222; stroke-width: 4; fill: none; stroke-linecap: round; }
      .arrowline { stroke: #333; stroke-width: 5; fill: none; marker-end: url(#arrow); }
      .node { fill: white; stroke: #111; stroke-width: 3.5; }
      .newnode { fill: #f6f6ff; stroke: #111; stroke-width: 4; }
      .label { font: 24px sans-serif; fill: #222; dominant-baseline: middle; text-anchor: middle; }
    </style>
  </defs>

  <!-- 左图 -->
  <circle cx="130" cy="130" r="24" class="node"></circle>
  <circle cx="130" cy="290" r="24" class="node"></circle>
  <circle cx="330" cy="130" r="24" class="node"></circle>
  <circle cx="330" cy="290" r="24" class="node"></circle>

  <text x="130" y="130" class="label">a</text>
  <text x="130" y="290" class="label">b</text>
  <text x="330" y="130" class="label">c</text>
  <text x="330" y="290" class="label">d</text>

  <!-- 左图 a 的左上角边 -->
  <line x1="113" y1="113" x2="70" y2="70" class="edge"></line>

  <!-- 左图 d 的右下角边 -->
  <line x1="347" y1="307" x2="390" y2="350" class="edge"></line>

  <!-- 中间箭头 -->
  <line x1="430" y1="210" x2="720" y2="210" class="arrowline"></line>

  <!-- 右图 -->
  <circle cx="820" cy="130" r="24" class="node"></circle>
  <circle cx="820" cy="290" r="24" class="node"></circle>
  <circle cx="1050" cy="130" r="24" class="node"></circle>
  <circle cx="1050" cy="290" r="24" class="node"></circle>
  <circle cx="935" cy="210" r="26" class="newnode"></circle>

  <text x="820" y="130" class="label">a</text>
  <text x="820" y="290" class="label">b</text>
  <text x="1050" y="130" class="label">c</text>
  <text x="1050" y="290" class="label">d</text>
  <text x="935" y="210" class="label">v</text>

  <!-- 右图 a 的左上角边 -->
  <line x1="803" y1="113" x2="760" y2="70" class="edge"></line>

  <!-- 右图 d 的右下角边 -->
  <line x1="1067" y1="307" x2="1110" y2="350" class="edge"></line>

  <!-- 右图中的 ab 和 cd -->
  <line x1="820" y1="154" x2="820" y2="266" class="edge"></line>
  <line x1="1050" y1="154" x2="1050" y2="266" class="edge"></line>

  <!-- 右图中的 bv 和 cv -->
  <line x1="840" y1="275" x2="914" y2="226" class="edge"></line>
  <line x1="1030" y1="145" x2="956" y2="194" class="edge"></line>
</svg>
