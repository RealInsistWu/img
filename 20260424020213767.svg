<svg width="1100" height="420" viewBox="0 0 1100 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .rod {
        stroke: #444;
        stroke-width: 16;
        stroke-linecap: round;
        fill: none;
      }
      .joint-outer {
        fill: #d9d9d9;
        stroke: #333;
        stroke-width: 3;
      }
      .joint-inner {
        fill: #ffffff;
        stroke: #666;
        stroke-width: 1.5;
      }
      .title {
        font: 30px sans-serif;
        fill: #111;
        text-anchor: middle;
      }
      .label {
        font: 24px sans-serif;
        fill: #222;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- 标题 -->
  <text x="550" y="48" class="title">刚性图示意：三角形与正方形</text>

  <!-- 左侧：三角形 -->
  <line x1="170" y1="300" x2="350" y2="300" class="rod"></line>
  <line x1="170" y1="300" x2="260" y2="130" class="rod"></line>
  <line x1="350" y1="300" x2="260" y2="130" class="rod"></line>

  <circle cx="170" cy="300" r="17" class="joint-outer"></circle>
  <circle cx="170" cy="300" r="7" class="joint-inner"></circle>

  <circle cx="350" cy="300" r="17" class="joint-outer"></circle>
  <circle cx="350" cy="300" r="7" class="joint-inner"></circle>

  <circle cx="260" cy="130" r="17" class="joint-outer"></circle>
  <circle cx="260" cy="130" r="7" class="joint-inner"></circle>

  <text x="260" y="370" class="label">三角形（刚性）</text>

  <!-- 右侧：正方形 -->
  <line x1="670" y1="130" x2="900" y2="130" class="rod"></line>
  <line x1="900" y1="130" x2="900" y2="300" class="rod"></line>
  <line x1="900" y1="300" x2="670" y2="300" class="rod"></line>
  <line x1="670" y1="300" x2="670" y2="130" class="rod"></line>

  <circle cx="670" cy="130" r="17" class="joint-outer"></circle>
  <circle cx="670" cy="130" r="7" class="joint-inner"></circle>

  <circle cx="900" cy="130" r="17" class="joint-outer"></circle>
  <circle cx="900" cy="130" r="7" class="joint-inner"></circle>

  <circle cx="900" cy="300" r="17" class="joint-outer"></circle>
  <circle cx="900" cy="300" r="7" class="joint-inner"></circle>

  <circle cx="670" cy="300" r="17" class="joint-outer"></circle>
  <circle cx="670" cy="300" r="7" class="joint-inner"></circle>

  <text x="785" y="370" class="label">正方形（非刚性）</text>
</svg>
